<!DOCTYPE html>
<html>
<head>
    <title>Login - Blockchain</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px #000;
        }
        input {
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: none;
            margin: 10px;
            width: 220px;
            text-align: center;
        }
        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #error {
            margin-top: 15px;
            font-weight: bold;
            color: #ffdddd;
        }
    </style>
</head>
<body>
    <h1>Login to Blockchain App</h1>
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username"><br>
        <input type="password" name="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
    <div id="error">{{ error }}</div>
</body>
</html>
